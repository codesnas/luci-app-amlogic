<%--
  SPDX-License-Identifier: GPL-2.0
  File upload widget template.

  Purpose: render the file chooser input and Upload submit button inside a
  CBI value row; delegates file handling to the amlogic_upload Lua model.
--%>
<%+cbi/valueheader%>
	<label class="cbi-value" style="display:inline-block; width: 150px" for="ulfile"><%:Choose local file:%></label>
	<input class="cbi-input-file" style="width: 400px" type="file" id="ulfile" name="ulfile" />
	<input type="submit" class="cbi-button cbi-input-apply" name="upload" value="<%:Upload%>" />
<%+cbi/valuefooter%>
